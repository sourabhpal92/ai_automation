<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .calculator {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .display-screen {
            width: 100%;
            height: 40px;
            margin-bottom: 20px;
            padding: 10px;
            font-size: 24px;
            font-weight: bold;
            text-align: right;
            background-color: #f0f0f0;
            border: none;
            border-radius: 10px;
        }
        
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
        }
        
        .key {
            padding: 10px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background-color: #fff;
            cursor: pointer;
        }
        
        .number-key {
            background-color: #fff;
        }
        
        .operation-key {
            background-color: #4CAF50;
            color: #fff;
        }
        
        .equals-key {
            background-color: #03A9F4;
            color: #fff;
        }
        
        .clear-key {
            background-color: #FF9800;
            color: #fff;
        }
        
        @media only screen and (max-width: 600px) {
            .calculator {
                width: 100%;
                margin: 20px auto;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display-screen" id="display-screen">0</div>
        <div class="keypad">
            <button class="key number-key" id="number-7">7</button>
            <button class="key number-key" id="number-8">8</button>
            <button class="key number-key" id="number-9">9</button>
            <button class="key operation-key" id="divide">/</button>
            <button class="key number-key" id="number-4">4</button>
            <button class="key number-key" id="number-5">5</button>
            <button class="key number-key" id="number-6">6</button>
            <button class="key operation-key" id="multiply">*</button>
            <button class="key number-key" id="number-1">1</button>
            <button class="key number-key" id="number-2">2</button>
            <button class="key number-key" id="number-3">3</button>
            <button class="key operation-key" id="subtract">-</button>
            <button class="key number-key" id="number-0">0</button>
            <button class="key number-key" id="decimal">.</button>
            <button class="key equals-key" id="equals">=</button>
            <button class="key operation-key" id="add">+</button>
            <button class="key clear-key" id="clear">AC</button>
        </div>
    </div>
    <script>
        const displayScreen = document.getElementById('display-screen');
        const numberKeys = document.querySelectorAll('.number-key');
        const operationKeys = document.querySelectorAll('.operation-key');
        const equalsKey = document.getElementById('equals');
        const clearKey = document.getElementById('clear');
        
        let currentInputSequence = '';
        let resultingAnswer = 0;
        
        function handleNumberInput(number) {
            currentInputSequence += number;
            displayScreen.textContent = currentInputSequence;
        }
        
        function handleOperationInput(operation) {
            currentInputSequence += operation;
            displayScreen.textContent = currentInputSequence;
        }
        
        function handleEqualsInput() {
            try {
                resultingAnswer = eval(currentInputSequence);
                displayScreen.textContent = resultingAnswer;
                currentInputSequence = resultingAnswer.toString();
            } catch (error) {
                displayScreen.textContent = 'Error';
                currentInputSequence = '';
            }
        }
        
        function clearInput() {
            currentInputSequence = '';
            resultingAnswer = 0;
            displayScreen.textContent = '0';
        }
        
        numberKeys.forEach(key => {
            key.addEventListener('click', () => {
                handleNumberInput(key.textContent);
            });
        });
        
        operationKeys.forEach(key => {
            key.addEventListener('click', () => {
                handleOperationInput(key.textContent);
            });
        });
        
        equalsKey.addEventListener('click', handleEqualsInput);
        clearKey.addEventListener('click', clearInput);
    </script>
</body>
</html>
