<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .calculator {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .display {
            width: 100%;
            height: 40px;
            margin-bottom: 20px;
            padding: 10px;
            font-size: 24px;
            font-weight: bold;
            text-align: right;
            background-color: #f5f5f5;
            border: none;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        . buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .button {
            width: 60px;
            height: 60px;
            margin: 5px;
            padding: 10px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #f5f5f5;
        }
        .equal {
            background-color: #4CAF50;
            color: #fff;
        }
        .equal:hover {
            background-color: #3e8e41;
        }
        .clear {
            background-color: #e74c3c;
            color: #fff;
        }
        .clear:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" class="display" value="0" readonly>
        <div class="buttons">
            <button class="button" onclick="handleClick('7')">7</button>
            <button class="button" onclick="handleClick('8')">8</button>
            <button class="button" onclick="handleClick('9')">9</button>
            <button class="button" onclick="handleClick('/')">/</button>
            <button class="button" onclick="handleClick('4')">4</button>
            <button class="button" onclick="handleClick('5')">5</button>
            <button class="button" onclick="handleClick('6')">6</button>
            <button class="button" onclick="handleClick('*')">*</button>
            <button class="button" onclick="handleClick('1')">1</button>
            <button class="button" onclick="handleClick('2')">2</button>
            <button class="button" onclick="handleClick('3')">3</button>
            <button class="button" onclick="handleClick('-')">-</button>
            <button class="button" onclick="handleClick('0')">0</button>
            <button class="button" onclick="handleClick('.')">.</button>
            <button class="button equal" onclick="handleClick('=')">=</button>
            <button class="button" onclick="handleClick('+')">+</button>
            <button class="button clear" onclick="clearDisplay()">C</button>
        </div>
    </div>
    <script>
        let display = document.getElementById('display');
        let memory = '0';
        let operation = null;

        function handleClick(key) {
            if (key === 'C') {
                clearDisplay();
            } else if (key === '=') {
                calculateResult();
            } else if (key === '+' || key === '-' || key === '*' || key === '/') {
                setOperation(key);
                setMemory(display.value);
                display.value = '0';
            } else {
                if (display.value === '0') {
                    display.value = key;
                } else {
                    display.value += key;
                }
            }
        }

        function setOperation(op) {
            operation = op;
        }

        function setMemory(val) {
            memory = val;
        }

        function calculateResult() {
            let num1 = parseFloat(memory);
            let num2 = parseFloat(display.value);
            let result;

            switch (operation) {
                case '+':
                    result = num1 + num2;
                    break;
                case '-':
                    result = num1 - num2;
                    break;
                case '*':
                    result = num1 * num2;
                    break;
                case '/':
                    if (num2 === 0) {
                        display.value = 'Error';
                        return;
                    }
                    result = num1 / num2;
                    break;
                default:
                    return;
            }

            display.value = result.toString();
        }

        function clearDisplay() {
            display.value = '0';
            memory = '0';
            operation = null;
        }
    </script>
</body>
</html>
